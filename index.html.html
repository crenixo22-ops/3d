<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Flow v6.0 - Rocket Core</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020204; font-family: 'Inter', sans-serif; color: white; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        #video-container { 
            position: absolute; bottom: 24px; right: 24px; 
            width: 240px; height: 180px; 
            border-radius: 16px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            transform: scaleX(-1);
        }
        #debug-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        #landmark-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glass { background: rgba(8, 8, 12, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .listening { animation: pulse 1s infinite; color: #ff0055; text-shadow: 0 0 15px #ff0055; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.02); } }
        #boot-loader { position: fixed; inset: 0; background: #020204; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s; }
    </style>
</head>
<body>

<div id="boot-loader">
    <div class="w-12 h-12 border-2 border-white/5 border-t-indigo-500 rounded-full animate-spin mb-6"></div>
    <p id="loader-status" class="text-[10px] tracking-[0.6em] font-black uppercase text-slate-500 text-center px-4 italic">Neural Core Initializing...</p>
</div>

<div id="ui-layer">
    <div class="p-8 flex justify-between items-start">
        <div class="glass p-6 rounded-3xl max-w-sm shadow-2xl">
            <h1 class="text-2xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-rose-500 uppercase tracking-tighter mb-1">Rocket Matrix</h1>
            <p class="text-[9px] tracking-[0.4em] text-slate-500 mb-6 font-black uppercase italic">Space Tech Engine v6.0</p>
            
            <div class="grid grid-cols-2 gap-2 mb-6">
                <div class="p-2.5 bg-white/5 rounded-xl border border-white/5"><p class="text-[10px] font-black text-blue-400 italic">🖐 SPHERE</p></div>
                <div class="p-2.5 bg-white/5 rounded-xl border border-white/5"><p class="text-[10px] font-black text-rose-500 italic">✌️ HEART</p></div>
                <div class="p-2.5 bg-white/5 rounded-xl border border-white/5"><p class="text-[10px] font-black text-lime-400 italic">☝️ POINT</p></div>
                <div class="p-2.5 bg-white/5 rounded-xl border border-white/5"><p class="text-[10px] font-black text-amber-400 italic">🖖 SATURN</p></div>
                <div class="p-2.5 bg-white/5 rounded-xl border border-indigo-500/30 col-span-2 shadow-[0_0_10px_rgba(99,102,241,0.2)]">
                    <p class="text-[10px] font-black text-cyan-400 uppercase text-center italic tracking-widest">🤙 SHAKA (ROCKET)</p>
                </div>
            </div>
            
            <button id="voice-btn" onclick="toggleVoice()" class="interactive w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl transition-all flex items-center justify-center gap-3 group">
                <div id="voice-indicator" class="w-2.5 h-2.5 rounded-full bg-slate-600 shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all"></div>
                <span id="voice-text" class="text-[11px] font-black tracking-widest text-slate-300 uppercase italic">Voice Engine</span>
            </button>
        </div>
        
        <div class="glass p-6 rounded-3xl text-right min-w-[200px] shadow-2xl border-white/5">
            <p id="status-text" class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest italic">Core Linked</p>
            <h2 id="current-gesture" class="text-3xl font-black mt-1 uppercase text-white italic tracking-tighter">-</h2>
            <div class="mt-4 h-1 bg-white/5 rounded-full overflow-hidden">
                <div id="confidence-bar" class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 transition-all duration-300 shadow-[0_0_10px_#6366f1]" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="debug-video" autoplay playsinline></video>
        <canvas id="landmark-canvas"></canvas>
    </div>

    <div id="voice-overlay" class="hidden fixed top-12 left-1/2 -translate-x-1/2 flex flex-col items-center justify-center pointer-events-none">
        <div id="recording-status" class="listening text-xs font-black tracking-[0.8em] text-rose-500 uppercase italic">Neural Sync...</div>
    </div>
</div>

<script type="module">
    const apiKey = ""; 
    let scene, camera, renderer, particles, geometry;
    const PARTICLE_COUNT = 15000;
    let particlePositions = new Float32Array(PARTICLE_COUNT * 3);
    let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    let particleColors = new Float32Array(PARTICLE_COUNT * 3);
    
    let handTracker, cameraFeed;
    let currentHandData = null;
    let isVoiceActive = false;
    let recognition;
    let activeTemplate = 'sphere';
    let lastResultTime = Date.now();

    // Saturated Clean Solids
    const solidPalette = [
        new THREE.Color('#ff0066'), 
        new THREE.Color('#00ffff'), 
        new THREE.Color('#39ff14'), 
        new THREE.Color('#ff3300'), 
        new THREE.Color('#9900ff'), 
        new THREE.Color('#ffcc00'), 
        new THREE.Color('#0066ff')  
    ];
    let targetColor = solidPalette[0].clone();

    const templates = {
        sphere: () => {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                pos[i*3] = 26 * Math.cos(theta) * Math.sin(phi);
                pos[i*3+1] = 26 * Math.sin(theta) * Math.sin(phi);
                pos[i*3+2] = 26 * Math.cos(phi);
            }
            return pos;
        },
        heart: () => {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = Math.random() * Math.PI * 2;
                pos[i*3] = 16 * Math.pow(Math.sin(t), 3) * 1.8;
                pos[i*3+1] = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 1.8;
                pos[i*3+2] = (Math.random() - 0.5) * 8;
            }
            return pos;
        },
        flower: () => {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * (16 + 10 * Math.sin(angle * 5));
                pos[i*3] = r * Math.cos(angle);
                pos[i*3+1] = r * Math.sin(angle);
                pos[i*3+2] = (Math.random() - 0.5) * 6;
            }
            return pos;
        },
        saturn: () => {
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (i < PARTICLE_COUNT * 0.4) {
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    pos[i*3] = 13 * Math.sin(phi) * Math.cos(theta);
                    pos[i*3+1] = 13 * Math.sin(phi) * Math.sin(theta);
                    pos[i*3+2] = 13 * Math.cos(phi);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 24 + Math.random() * 10;
                    pos[i*3] = r * Math.cos(angle);
                    pos[i*3+1] = (Math.random() - 0.5) * 3;
                    pos[i*3+2] = r * Math.sin(angle);
                }
            }
            return pos;
        },
        rocket: () => {
            // Realistic 3D Rocket Silhouette with Thruster Flow
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const r = i / PARTICLE_COUNT;
                let x, y, z;
                
                if (r < 0.45) {
                    // Fuselage (Body Cylinder)
                    const height = (Math.random() - 0.5) * 40; // Total body height
                    const radius = height > 10 ? 8 * (1 - (height - 10) / 15) : 8; // Taper for nose cone
                    const angle = Math.random() * Math.PI * 2;
                    x = radius * Math.cos(angle);
                    z = radius * Math.sin(angle);
                    y = height + 5;
                } else if (r < 0.65) {
                    // Fins (4 structural fins at base)
                    const finIdx = Math.floor((r - 0.45) / 0.05);
                    const angle = (finIdx * Math.PI) / 2;
                    const dist = 8 + Math.random() * 8;
                    const height = (Math.random() - 0.5) * 12 - 10;
                    x = dist * Math.cos(angle) * (1 - (height + 16) / 20); 
                    z = dist * Math.sin(angle) * (1 - (height + 16) / 20);
                    y = height;
                } else if (r < 0.85) {
                    // Thruster Exhaust Flow
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 6;
                    const fall = Math.random() * 30;
                    x = dist * Math.cos(angle) * (1 + fall / 10);
                    z = dist * Math.sin(angle) * (1 + fall / 10);
                    y = -15 - fall;
                } else {
                    // Detailed Portholes / Structural Accents
                    const angle = Math.random() * Math.PI * 2;
                    const h = (Math.random() * 20);
                    x = 8.2 * Math.cos(angle);
                    z = 8.2 * Math.sin(angle);
                    y = h;
                }
                
                pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
            }
            return pos;
        },
        love: () => generateTextPositions("I LOVE U")
    };

    function generateTextPositions(text) {
        const pos = new Float32Array(PARTICLE_COUNT * 3);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1600; canvas.height = 400;
        ctx.clearRect(0, 0, 1600, 400);
        ctx.fillStyle = 'white';
        const fs = text.length > 8 ? 120 : 180;
        ctx.font = `bold italic ${fs}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text.toUpperCase(), 800, 200);
        const img = ctx.getImageData(0, 0, 1600, 400).data;
        const pts = [];
        for (let y = 0; y < 400; y += 3) {
            for (let x = 0; x < 1600; x += 3) {
                if (img[(y * 1600 + x) * 4 + 3] > 120) {
                    pts.push({ x: (x - 800) * 0.08, y: (200 - y) * 0.08 });
                }
            }
        }
        if (pts.length === 0) return templates.saturn();
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const p = pts[i % pts.length];
            pos[i*3] = p.x; pos[i*3+1] = p.y; pos[i*3+2] = (Math.random() - 0.5) * 5;
        }
        return pos;
    }

    function switchSolidColor() {
        const next = solidPalette[Math.floor(Math.random() * solidPalette.length)];
        targetColor.copy(next);
    }

    async function initHandTracking() {
        const video = document.getElementById('debug-video');
        const canvas = document.getElementById('landmark-canvas');
        const ctx = canvas.getContext('2d');
        
        (function() {
            if (typeof window.Hands === 'undefined' || typeof window.Camera === 'undefined') {
                setTimeout(initHandTracking, 500);
                return;
            }

            try {
                window.arguments = undefined; 
                handTracker = new window.Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                handTracker.setOptions({
                    maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
                });

                handTracker.onResults((results) => {
                    lastResultTime = Date.now();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        currentHandData = results.multiHandLandmarks[0];
                        if (window.drawConnectors) window.drawConnectors(ctx, currentHandData, window.HAND_CONNECTIONS, {color: 'rgba(255,255,255,0.4)', lineWidth: 3});
                        if (window.drawLandmarks) window.drawLandmarks(ctx, currentHandData, {color: '#ffffff', radius: 2});
                        if (!isVoiceActive) analyzeGestures();
                        document.getElementById('confidence-bar').style.width = "100%";
                    } else {
                        currentHandData = null;
                        document.getElementById('current-gesture').innerText = "-";
                        document.getElementById('confidence-bar').style.width = "0%";
                    }
                });

                cameraFeed = new window.Camera(video, {
                    onFrame: async () => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        await handTracker.send({ image: video });
                    },
                    width: 480, height: 360
                });

                cameraFeed.start().then(() => {
                    document.getElementById('boot-loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('boot-loader').style.display = 'none', 800);
                    document.getElementById('status-text').innerText = "Vocal Ready";
                });
            } catch (err) {
                setTimeout(initHandTracking, 2000);
            }
        })();
    }

    setInterval(() => {
        if (!document.hidden && Date.now() - lastResultTime > 8000) {
            if (cameraFeed) cameraFeed.start().catch(() => {});
        }
    }, 5000);

    function analyzeGestures() {
        if (!currentHandData) return;
        const l = currentHandData;
        const up = (t, p) => l[t].y < l[p].y;
        
        const thumb = l[4].x < l[3].x;
        const index = up(8, 6), middle = up(12, 10), ring = up(16, 14), pinky = up(20, 18);

        let shape = null;
        if (index && middle && ring && pinky) shape = 'sphere';
        else if (index && middle && !ring && !pinky) shape = 'heart';
        else if (index && !middle && !ring && !pinky) shape = 'flower';
        else if (index && middle && ring && !pinky) shape = 'saturn';
        else if (thumb && pinky && !index && !middle && !ring) shape = 'rocket'; // SHAKA
        else if (!index && !middle && !ring && !pinky) shape = 'love';

        if (shape && shape !== activeTemplate) {
            activeTemplate = shape;
            document.getElementById('current-gesture').innerText = shape.toUpperCase();
            window.setTemplate(shape);
        }
    }

    async function callGemini(text, retry = 0) {
        if (!apiKey) return;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    systemInstruction: { parts: [{ text: "Extract the single most impactful word (max 10 chars). CAPS ONLY." }] }
                })
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            const clean = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
            if (clean) {
                targetPositions = generateTextPositions(clean);
                switchSolidColor();
            }
        } catch(e) {
            if (retry < 5) {
                const delays = [1000, 2000, 4000, 8000, 16000];
                setTimeout(() => callGemini(text, retry + 1), delays[retry]);
            }
        }
    }

    window.toggleVoice = () => {
        isVoiceActive = !isVoiceActive;
        const overlay = document.getElementById('voice-overlay'), ind = document.getElementById('voice-indicator');
        if (isVoiceActive) {
            overlay.classList.remove('hidden'); 
            ind.classList.add('bg-rose-500', 'shadow-[0_0_15px_#f43f5e]');
            ind.classList.remove('bg-slate-600');
            window.setTemplate('saturn'); 
            startRecognition();
        } else {
            overlay.classList.add('hidden'); 
            ind.classList.remove('bg-rose-500', 'shadow-[0_0_15px_#f43f5e]');
            ind.classList.add('bg-slate-600');
            if(recognition) { 
                recognition.onend = null; 
                recognition.onerror = null;
                try { recognition.stop(); } catch(e) {}
            }
        }
    };

    function startRecognition() {
        const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (!SR) return;
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.onresult = (e) => {
            const r = e.results[e.results.length - 1];
            const text = r[0].transcript.toUpperCase();
            if (text.trim() !== "") {
                targetPositions = generateTextPositions(text);
                if (r.isFinal) { callGemini(text); switchSolidColor(); }
            }
        };
        recognition.onerror = (e) => { if (e.error === 'no-speech') window.setTemplate('saturn'); };
        recognition.onend = () => { if (isVoiceActive) try { recognition.start(); } catch(err) {} };
        recognition.start();
    }

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 75; // Moved camera back slightly for taller rocket
        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        geometry = new THREE.BufferGeometry();
        const start = templates.sphere();
        targetPositions.set(start);
        particlePositions.set(start);
        for(let i=0; i<PARTICLE_COUNT; i++) {
            particleColors[i*3] = targetColor.r; particleColors[i*3+1] = targetColor.g; particleColors[i*3+2] = targetColor.b;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        
        particles = new THREE.Points(geometry, new THREE.PointsMaterial({ 
            size: 1.15, vertexColors: true, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, sizeAttenuation: true 
        }));
        scene.add(particles);

        initHandTracking();
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    window.setTemplate = (name) => {
        targetPositions.set(templates[name]());
        switchSolidColor();
    };

    function animate() {
        requestAnimationFrame(animate);
        const pos = geometry.attributes.position.array;
        const col = geometry.attributes.color.array;
        let speed = 0.22, scale = 1.0;

        if (currentHandData) {
            const hX = (0.5 - currentHandData[9].x) * 120, hY = (0.5 - currentHandData[9].y) * 120;
            const pinch = Math.sqrt(Math.pow(currentHandData[4].x - currentHandData[8].x, 2) + Math.pow(currentHandData[4].y - currentHandData[8].y, 2));
            scale = Math.max(0.2, pinch * 8.0);
            camera.position.x += (hX * 0.4 - camera.position.x) * 0.15;
            camera.position.y += (hY * 0.4 - camera.position.y) * 0.15;
            camera.lookAt(0,0,0);
            speed = 0.4; 
        }

        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            pos[i] += (targetPositions[i] * scale - pos[i]) * speed;
            const channel = i % 3;
            const targetVal = channel === 0 ? targetColor.r : channel === 1 ? targetColor.g : targetColor.b;
            col[i] += (targetVal - col[i]) * 0.1;
        }
        
        geometry.attributes.position.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;
        
        if (!isVoiceActive) particles.rotation.y += 0.003;
        else particles.rotation.y += (0 - particles.rotation.y) * 0.2;
        
        renderer.render(scene, camera);
    }
    window.onload = init;
</script>

</body>
</html>
